id = "plan-code-review"
name = "Plan → Code → Review"
version = "0.4.0"
min_herdr_version = "0.7.0"
description = "Opus가 계획, Sonnet이 코딩, Claude+Codex가 리뷰 — 액션 하나로 에이전트 판 4개를 연다."
platforms = ["linux", "macos"]

[[actions]]
id = "layout"
title = "Plan → Code → Review layout"
contexts = ["workspace", "tab"]
command = ["bash", "actions/layout.sh"]

[[actions]]
id = "review"
title = "현재 diff를 리뷰어에게 핸드오프"
contexts = ["workspace", "tab"]
command = ["bash", "actions/review.sh"]

[[actions]]
id = "collect"
title = "리뷰 결과 수집 → 한 파일로"
contexts = ["workspace", "tab"]
command = ["bash", "actions/collect.sh"]

[[actions]]
id = "setup-subagent-panes"
title = "Claude 서브에이전트 뷰어 판 훅 설치"
contexts = ["workspace", "tab"]
command = ["bash", "actions/setup-subagent-panes.sh"]

[[events]]
on = "pane.agent_status_changed"
command = ["bash", "events/on-status.sh"]
